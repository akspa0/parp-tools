name: Release parp-tools WoW Viewer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.4.6)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Clone external library dependencies into lib/ ──
      # These are separate GitHub repos that aren't git submodules of this repo.
      # Some of them have their own submodules (DBCD, SereniaBLPLib).

      - name: Clone WoWDBDefs (DBC definitions)
        run: git clone --depth 1 https://github.com/wowdev/WoWDBDefs.git gillijimproject_refactor/lib/WoWDBDefs

      - name: Clone wow.tools.local + DBCD submodule only
        run: |
          git clone --depth 1 https://github.com/Marlamin/wow.tools.local gillijimproject_refactor/lib/wow.tools.local
          Remove-Item -Recurse -Force gillijimproject_refactor/lib/wow.tools.local/DBCD -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/wowdev/DBCD gillijimproject_refactor/lib/wow.tools.local/DBCD

      - name: Patch DBCD target frameworks for CI compatibility
        run: |
          $dbcdProjects = @(
            "gillijimproject_refactor/lib/wow.tools.local/DBCD/DBCD/DBCD.csproj",
            "gillijimproject_refactor/lib/wow.tools.local/DBCD/DBCD.IO/DBCD.IO.csproj"
          )
          foreach ($proj in $dbcdProjects) {
            if (Test-Path $proj) {
              $content = Get-Content $proj -Raw
              $patched = $content -replace '<TargetFrameworks>[^<]+</TargetFrameworks>', '<TargetFrameworks>netstandard2.1;net8.0;net9.0;net10.0</TargetFrameworks>'
              Set-Content $proj $patched
              Write-Host "Patched $proj"
            }
          }

      - name: Clone WoWTools.Minimaps + SereniaBLPLib submodule only
        run: |
          git clone --depth 1 https://github.com/Marlamin/WoWTools.Minimaps gillijimproject_refactor/lib/WoWTools.Minimaps
          Remove-Item -Recurse -Force gillijimproject_refactor/lib/WoWTools.Minimaps/SereniaBLPLib -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/WoW-Tools/SereniaBLPLib.git gillijimproject_refactor/lib/WoWTools.Minimaps/SereniaBLPLib

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore gillijimproject_refactor/src/MdxViewer/MdxViewer.csproj

      - name: Publish Release (self-contained)
        run: |
          dotnet publish gillijimproject_refactor/src/MdxViewer/MdxViewer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:ErrorOnDuplicatePublishOutputFiles=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o gillijimproject_refactor/publish/ParpToolsWoWViewer

      - name: Verify definitions bundled
        run: |
          if (!(Test-Path "gillijimproject_refactor/publish/ParpToolsWoWViewer/definitions/AreaTable.dbd")) {
            Write-Error "WoWDBDefs definitions not found in publish output!"
            exit 1
          }
          $count = (Get-ChildItem "gillijimproject_refactor/publish/ParpToolsWoWViewer/definitions/*.dbd").Count
          Write-Host "Bundled $count .dbd definition files"

      - name: Create ZIP archive
        run: |
          $version = if ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          Compress-Archive -Path "gillijimproject_refactor/publish/ParpToolsWoWViewer/*" -DestinationPath "parp-tools-wow-viewer-${version}-win-x64.zip"
          Write-Host "Created parp-tools-wow-viewer-${version}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: parp-tools WoW Viewer ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## parp-tools WoW Viewer

            Build `${{ github.event.inputs.version || github.ref_name }}` of the active WoW world/model viewer and debugging surface in this repo.

            Author: `github.com/akspa0/parp-tools`

            Special thanks to WoWdev.wiki, Exploration Reboot, The Alpha Project, and everyone in the Pre-Alpha Restoration Project discord!

            Current support target: WoW Alpha `0.5.3` through Cataclysm `4.0.0.11927`.

            ### Release Notes
            - PM4 overlay decoding and placement support is materially stronger on the development map, including better camera-window coverage, tile remap handling, empty-carrier handling, and linked-group placement resolution.
            - Recent rendering work started reducing repeated world-scene submission cost by reusing MDX visibility results and deferring WMO doodad expansion instead of constructing everything on first sight.
            - Performance work is still active. This release improves the current path, but it is not yet the final render-layer or draw-submission redesign.

            ### Quick Start
            1. Extract the ZIP
            2. Run `ParpToolsWoWViewer.exe path\to\game\directory`

            ### Requirements
            - Windows x64
            - OpenGL 3.3+ capable GPU
            - WoW game data (MPQ archives)

            ### What's Included
            - Self-contained .NET 10 runtime (no install needed)
            - WoWDBDefs definitions for DBC parsing
            - Pure C# MPQ reader (no StormLib dependency)
          files: parp-tools-wow-viewer-*-win-x64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}