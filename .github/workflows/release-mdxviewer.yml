name: Release parp-tools WoW Viewer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.4.6)'
        required: true

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            tfm: net10.0
            project: gillijimproject_refactor/src/MdxViewer/MdxViewer.CrossPlatform.csproj
            os_label: Linux x64
          - os: macos-latest
            rid: osx-x64
            tfm: net10.0
            project: gillijimproject_refactor/src/MdxViewer/MdxViewer.CrossPlatform.csproj
            os_label: macOS x64
          - rid: win-x64
            os: windows-latest
            tfm: net10.0-windows
            project: gillijimproject_refactor/src/MdxViewer/MdxViewer.csproj
            os_label: Windows x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap library dependencies
        working-directory: gillijimproject_refactor
        shell: pwsh
        run: ./setup-libs.ps1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore ${{ matrix.project }} -p:TargetFramework=${{ matrix.tfm }} --runtime ${{ matrix.rid }}

      - name: Publish (${{ matrix.os_label }})
        shell: pwsh
        run: |
          dotnet publish ${{ matrix.project }} `
            -c Release `
            -f ${{ matrix.tfm }} `
            -p:TargetFramework=${{ matrix.tfm }} `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ErrorOnDuplicatePublishOutputFiles=false `
            -p:TreatWarningsAsErrors=false `
            -o publish/MdxViewer-${{ matrix.rid }}

      - name: Verify definitions bundled
        shell: pwsh
        run: |
          $pubDir = "publish/MdxViewer-${{ matrix.rid }}"
          if (!(Test-Path "$pubDir/definitions/AreaTable.dbd")) {
            Write-Error "WoWDBDefs definitions not found in publish output!"
            exit 1
          }
          $count = (Get-ChildItem "$pubDir/definitions/*.dbd").Count
          Write-Host "Bundled $count .dbd definition files"

      - name: Bundle README and user guide
        shell: pwsh
        run: |
          $pubDir = "publish/MdxViewer-${{ matrix.rid }}"
          Copy-Item "gillijimproject_refactor/src/MdxViewer/USERGUIDE.md" "$pubDir/USERGUIDE.md"
          Copy-Item "gillijimproject_refactor/src/MdxViewer/README.md" "$pubDir/README.md"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = if ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          $zipName = "parp-tools-wow-viewer-${version}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/MdxViewer-${{ matrix.rid }}/*" -DestinationPath $zipName
          Write-Host "Created $zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parp-tools-wow-viewer-${{ matrix.rid }}
          path: parp-tools-wow-viewer-*-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: parp-tools WoW Viewer ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## parp-tools WoW Viewer ${{ github.event.inputs.version || github.ref_name }}

            .NET 10 / OpenGL 3.3 world viewer and debugging surface for WoW data from Alpha `0.5.3` through `4.0.0.11927`.

            ### v0.4.6 Highlights
            - **PM4 Runtime Decode And Placement Upgrade** — stronger development-map PM4 correctness through camera-window indexing fixes, transposed tile remap handling, empty-carrier coverage handling, and linked-group placement resolution.
            - **First Rendering Performance Slice** — reduced repeated MDX visibility work and deferred WMO doodad expansion so the scene path does less redundant CPU-side work while data streams in.
            - **Viewer Release Freeze On Current PM4 Wins** — this build intentionally freezes the current PM4 runtime gains instead of rolling straight into the larger render-layer rewrite.

            ### Other Included Fixes
            - **Release Packaging Hardening** — release publish now tolerates duplicate dependency-side publish artifacts from the legacy `WoWRollback.PM4Module` executable reference chain.
            - **Documentation And Continuity Sync** — versioning, README snapshots, and continuity notes now align on `v0.4.6` as the active release target.
            - **Renderer Direction Locked** — the next major renderer step remains a real render-layer or submission-bucket redesign rather than another isolated micro-fix.

            ### Quick Start
            1. Extract the ZIP for your platform
            2. Run `ParpToolsWoWViewer` and open a base client or loose world data from the UI

            ### Requirements
            - OpenGL 3.3+ capable GPU
            - WoW game data (MPQ archives and/or loose files)

            ### What's Included
            - Self-contained .NET 10 runtime (no install needed)
            - WoWDBDefs definitions for DBC parsing
            - Pure C# MPQ reader (no StormLib dependency)

            ### Validation Note
            - The active viewer still has limited first-party automated regression coverage.
            - This release reflects solution builds plus targeted real-data runtime checks for specific repaired issues; it is not a claim of broad automated validation across every viewer subsystem.
          files: artifacts/parp-tools-wow-viewer-*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
